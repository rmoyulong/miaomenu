# =============================================================================
# MiaoMenu_fork
# 喵喵選單外掛分支版，支援 Paper / Folia / Geyser 26.1.x（亦相容 26.2 alpha）與多語系。
# Fork:           https://github.com/Avery11111101/MiaoMenu_fork
# 原作 / Original: https://github.com/Yamada0001/MiaoMenu
# =============================================================================
name: ${project.name}
version: ${project.version}
main: com.fluxcraft.MiaoMenu.MiaoMenu
api-version: '26.1'
description: MiaoMenu_fork — 喵喵選單外掛分支版，支援 Java 版與基岩版玩家。Fork https://github.com/Avery11111101/MiaoMenu_fork ／原作 https://github.com/Yamada0001/MiaoMenu
author: MingLi
folia-supported: true
softdepend: [Floodgate, Geyser-Spigot, PlaceholderAPI, CraftEngine]
commands:
  dgeysermenu:
    description: 主命令
    usage: /<command> <open|reload|help>
    aliases: [dgm, fluxmenu, mmf]
  getmenuclock:
    description: 获取菜单钟表
    usage: /<command>
    permission: dgeysermenu.admin
permissions:
  dgeysermenu.*:
    description: 所有权限
    children:
      dgeysermenu.use: true
      dgeysermenu.admin: true
      dgeysermenu.reload: true
  dgeysermenu.use:
    description: 使用菜单命令
    default: true
  dgeysermenu.admin:
    description: 管理权限
    default: op
  dgeysermenu.reload:
    description: 重载插件
    default: op
