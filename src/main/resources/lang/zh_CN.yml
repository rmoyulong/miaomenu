help:
  header: "&6✿ &e你好呀，旅行者 &6✿"
  usage: "&7✎ 悬停查看详情，轻触以令之行"
  detail-hint: "&7✎ 想看单个指令详解，输入 &f/dgm help <指令名称>"
  unknown-command: "&c✦ 没有 &e{0}&c 这道指令。可用 &f/dgm help&c 查看完整列表。"
  detail:
    header: "&6✿ &e/dgm {0} &6— 指令详解 ✿"
    usage-label: "&7用法："
    permission-label: "&7权限："
  commands:
    open:
      usage: "&f/dgm open <菜单名称>"
      detail: |-
        &7打开指定的菜单。
        &7Java 玩家会看到箱子 GUI，基岩玩家会看到 Floodgate 表单，插件自动判断。
        &7菜单名称可用 Tab 补全（会列出 java_menus/ 与 bedrock_menus/ 内定义的菜单）。
      permission: "&fdgeysermenu.use"
    reload:
      usage: "&f/dgm reload"
      detail: |-
        &7重新加载 config.yml、所有 Java 菜单与基岩菜单。
        &7若同时修改了 lang 文件，请改用 &f/dgm lang <现有语言>&7 或直接重启。
      permission: "&fdgeysermenu.reload"
    import:
      usage: |-
        &f/dgm import scan
        &f/dgm import preview <来源>
        &f/dgm import apply <来源> <token> [--overwrite|--rename]
        &f/dgm import rollback [备份ID]
      detail: |-
        &7在「插件已运行」的服务器上手动导入旧版文件夹。
        &7支持来源：
        &7  · &fDGeyserMenu&7／&fdgeysermenu&7／&fMiaoMenu&7 — 同 schema，整批文件复制
        &7  · &fDeluxeMenus&7／&fdmenu&7 — 不同 schema，自动把 gui_menus 转换成 java_menus/&lt;id&gt;.yml
        &7流程：scan 看候选 → preview 出 token → apply 带 token 落盘（冲突文件自动备份到 backups/）→ rollback 还原。
        &7默认冲突策略 SKIP；可加 &f--overwrite&7 强制覆写或 &f--rename&7 把旧版加 .imported 后缀并存。
      permission: "&fdgeysermenu.import &7或 &fdgeysermenu.admin"
    lang:
      usage: "&f/dgm lang [<语言代码>] &7或 &f/mmflang <语言代码> &7或 &f/lang <语言代码>"
      detail: |-
        &7切换 MiaoMenu_fork 显示语言并即时重新加载消息文件。
        &7无参数时显示当前语言与可用语言列表。
        &7常见语言代码：&fen&7（英文）、&fzh_TW&7（繁中）；你也可以在 plugins/MiaoMenu_fork/lang/ 内放 &f<code>.yml&7 自定义语言文件。
        &7切换后 &f/dgm help&7 与所有消息会跟着变语系，无需重启。
      permission: "&fdgeysermenu.admin"
    about:
      usage: "&f/dgm about"
      detail: |-
        &7显示插件版本、Fork / 原作 GitHub 链接与 Modrinth 下载页。
        &7若 Modrinth 上检测到新版本，也会在此消息底部提示。
      permission: "&7（无需权限）"
    whoami:
      usage: "&f/dgm whoami"
      detail: |-
        &7诊断 Floodgate / Geyser 对你这位玩家的辨识结果，主要用于排查
        &7「基岩端进来却看到 Java 箱子 GUI」的情境（Velocity proxy 常见）。
        &7会列出：Floodgate plugin 版本、isFloodgatePlayer 返回、UUID prefix、
        &7Bedrock username / xuid、linkedPlayer、最终 smart-dispatch 走哪边。
        &7任何一行返回 false / null 就指出哪段环节坏掉，不用再翻 server log。
      permission: "&7（无需权限，仅显示自己的信息）"
    help:
      usage: "&f/dgm help [<子指令>]"
      detail: |-
        &7不带参数时列出所有子指令；带参数时显示该子指令的详解。
        &7例如：&f/dgm help import&7 会显示导入指令的完整教学。
      permission: "&7（无需权限）"

