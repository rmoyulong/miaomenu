import:
  scan:
    header: "&b✦ 检测到 &e{0} &b个可导入的文件夹候选："
    entry: "&7  · &e{0} &7— Java 菜单 &a{1} &7／基岩菜单 &a{2} &7／config-version &b{3}"
    entry-deluxemenus: "&7  · &e{0} &d[DeluxeMenus]&7 — 菜单 &a{1} &7（会自动转换到 java_menus/ + bedrock_menus/ 各一份，原文件夹保留）"
    empty: "&e✦ 未检测到可导入的文件夹（会搜索 plugins/ 内的 DGeyserMenu、dgeysermenu、MiaoMenu、DeluxeMenus、dmenu）。"
    hint: "&7✎ 下一步：&f/dgm import preview <来源> &7查看差异与 token。"
  preview:
    header: "&b✦ 预览 &e{0} &b：新增 &a{1} &b／跳过 &7{2} &b／冲突 &c{3}"
    add: "&a  + {0}"
    skip: "&7  = {0}"
    conflict: "&c  ! {0}"
    truncated: "&7  …（另有 {0} 笔未显示）"
    token: "&e✦ 确认码：&f{0} &7— 套用时请输入 &f/dgm import apply {1} {0}"
    unknown-source: "&c✦ 找不到名为 &e{0}&c 的可导入文件夹，可先用 &f/dgm import scan&c 查看清单。"
    io-error: "&c✦ 预览 &e{0}&c 时读档失败，请查阅控制台。"
    deluxemenus-note: |-
      &d✦ 检测到 DeluxeMenus 结构：将自动同时产出两份输出
      &7  · &fjava_menus/&lt;id&gt;.yml&7 — Java 版箱子 GUI（保留 slot、左/右/中/shift 全部 click 链）
      &7  · &fbedrock_menus/&lt;id&gt;.yml&7 — 基岩版 Floodgate 表单（依 slot 排序成按钮列表，每颗按钮仅取第一个动作）
      &7  · 动作 prefix 对应：[console]→[cmd]、[openguimenu] X→[player] dgm open X，其余原样保留
      &7  · material → 基岩贴图走 vanilla 对照表，未命中者显示为纯文本按钮
      &7  · 不转换 update / skin 字段；conditions / view_requirement 会原样保留供您手动审阅
      &7  · 原 DeluxeMenus 文件夹完全不动，可随时 rollback
  apply:
    no-session: "&c✦ 找不到对应的 preview 记录（可能已超时 5 分钟），请重跑 &f/dgm import preview <来源>&c。"
    token-mismatch: "&c✦ 确认码或来源不符，请对照 preview 显示的内容重新输入。"
    success: "&a✦ 已导入 &e{0}&a：新增 &f{1} &a／跳过 &f{2} &a／冲突处理 &f{3} &a，备份 &7{4}&a。已自动重新加载。"
    io-error: "&c✦ 套用过程发生 IO 错误，请查阅控制台。已建立的备份不会被删除。"
  rollback:
    success: "&a✦ 已从备份 &e{0}&a 还原 &f{1}&a 个文件，并重新加载。"
    not-found: "&e✦ 当前没有可用的导入备份。"
    io-error: "&c✦ 还原备份 &e{0}&c 失败，请查阅控制台。"

