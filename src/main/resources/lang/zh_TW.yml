help:
  header: "&6✿ &e你好呀，旅行者 &6✿"
  usage: "&7✎ 懸停查看詳情，輕觸以令之行"
  detail-hint: "&7✎ 想看單一指令詳解，輸入 &f/dgm help <指令名稱>"
  unknown-command: "&c✦ 沒有 &e{0}&c 這道指令。可用 &f/dgm help&c 查看完整列表。"
  detail:
    header: "&6✿ &e/dgm {0} &6— 指令詳解 ✿"
    usage-label: "&7用法："
    permission-label: "&7權限："
  commands:
    open:
      usage: "&f/dgm open <選單名稱>"
      detail: |-
        &7開啟指定的選單。
        &7Java 玩家會看到箱子 GUI，基岩玩家會看到 Floodgate 表單，插件自動判斷。
        &7選單名稱可用 Tab 補全（會列出 java_menus/ 與 bedrock_menus/ 內定義的選單）。
      permission: "&fdgeysermenu.use"
    reload:
      usage: "&f/dgm reload"
      detail: |-
        &7重新載入 config.yml、所有 Java 選單與基岩選單。
        &7若同時修改了 lang 檔，請改用 &f/dgm lang <現有語言>&7 或直接重啟。
      permission: "&fdgeysermenu.reload"
    import:
      usage: |-
        &f/dgm import scan
        &f/dgm import preview <來源>
        &f/dgm import apply <來源> <token> [--overwrite|--rename]
        &f/dgm import rollback [備份ID]
      detail: |-
        &7在「插件已運行」的伺服器上手動匯入舊版資料夾。
        &7支援來源：
        &7  · &fDGeyserMenu&7／&fdgeysermenu&7／&fMiaoMenu&7 — 同 schema，整批檔案複製
        &7  · &fDeluxeMenus&7／&fdmenu&7 — 不同 schema，自動把 gui_menus 轉換成 java_menus/&lt;id&gt;.yml
        &7流程：scan 看候選 → preview 出 token → apply 帶 token 落盤（衝突檔自動備份到 backups/）→ rollback 還原。
        &7預設衝突策略 SKIP；可加 &f--overwrite&7 強制覆寫或 &f--rename&7 把舊版加 .imported 後綴並存。
      permission: "&fdgeysermenu.import &7或 &fdgeysermenu.admin"
    lang:
      usage: "&f/dgm lang [<語言碼>] &7或 &f/mmflang <語言碼> &7或 &f/lang <語言碼>"
      detail: |-
        &7切換 MiaoMenu_fork 顯示語言並即時重新載入訊息檔。
        &7無參數時顯示目前語言與可用語言列表。
        &7常見語言碼：&fen&7（英文）、&fzh_TW&7（繁中）；你也可以在 plugins/MiaoMenu_fork/lang/ 內放 &f<code>.yml&7 自訂語言檔。
        &7切換後 &f/dgm help&7 與所有訊息會跟著變語系，無需重啟。
      permission: "&fdgeysermenu.admin"
    about:
      usage: "&f/dgm about"
      detail: |-
        &7顯示插件版本、Fork / 原作 GitHub 連結與 Modrinth 下載頁。
        &7若 Modrinth 上偵測到新版本，也會在此訊息底部提示。
      permission: "&7（無需權限）"
    help:
      usage: "&f/dgm help [<子指令>]"
      detail: |-
        &7不帶參數時列出所有子指令；帶參數時顯示該子指令的詳解。
        &7例如：&f/dgm help import&7 會顯示匯入指令的完整教學。
      permission: "&7（無需權限）"

