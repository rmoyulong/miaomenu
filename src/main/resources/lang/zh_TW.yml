    skip: "&7  = {0}"
    conflict: "&c  ! {0}"
    truncated: "&7  …（另有 {0} 筆未顯示）"
    token: "&e✦ 確認碼：&f{0} &7— 套用時請輸入 &f/dgm import apply {1} {0}"
    unknown-source: "&c✦ 找不到名為 &e{0}&c 的可匯入資料夾，可先用 &f/dgm import scan&c 查看清單。"
    io-error: "&c✦ 預覽 &e{0}&c 時讀檔失敗，請查閱主控台。"
    deluxemenus-note: |-
      &d✦ 偵測到 DeluxeMenus 結構：將自動把 gui_menus/ 內的選單逐一轉換為本插件的 java_menus/&lt;id&gt;.yml。
      &7  · 動作 prefix 對應：[console]→[cmd]、[openguimenu] X→[player] dgm open X，其餘原樣保留
      &7  · 不轉 update / skin 欄位；conditions / view_requirement 會原樣保留供您手動審閱
      &7  · 原 DeluxeMenus 資料夾完全不動，可隨時 rollback
  apply:
