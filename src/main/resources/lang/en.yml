help:
  header: "&6✿ &eHello, traveller &6✿"
  usage: "&7✎ Hover to see details, click to run the command"
  detail-hint: "&7✎ For a single-command deep dive, type &f/dgm help <command>"
  unknown-command: "&c✦ Unknown command &e{0}&c. Run &f/dgm help&c for the full list."
  detail:
    header: "&6✿ &e/dgm {0} &6— command details ✿"
    usage-label: "&7Usage:"
    permission-label: "&7Permission:"
  commands:
    open:
      usage: "&f/dgm open <menu>"
      detail: |-
        &7Open the specified menu.
        &7Java players get a chest GUI, Bedrock players get a Floodgate form — auto-dispatched.
        &7The menu name supports tab completion (lists everything under java_menus/ and bedrock_menus/).
      permission: "&fdgeysermenu.use"
    reload:
      usage: "&f/dgm reload"
      detail: |-
        &7Reload config.yml plus all Java and Bedrock menus.
        &7If you edited a lang file, run &f/dgm lang <current_code>&7 (or restart) so messages refresh too.
      permission: "&fdgeysermenu.reload"
    import:
      usage: |-
        &f/dgm import scan
        &f/dgm import preview <source>
        &f/dgm import apply <source> <token> [--overwrite|--rename]
        &f/dgm import rollback [backupId]
      detail: |-
        &7Manually import legacy data on an already-running server.
        &7Supported sources:
        &7  · &fDGeyserMenu&7 / &fdgeysermenu&7 / &fMiaoMenu&7 — same schema, copied verbatim
        &7  · &fDeluxeMenus&7 / &fdmenu&7 — different schema, gui_menus is auto-converted into java_menus/<id>.yml
        &7Flow: scan → preview to get a token → apply with the token (conflicts get auto-backed-up to backups/) → rollback if needed.
        &7Default conflict policy is SKIP; pass &f--overwrite&7 to overwrite in place or &f--rename&7 to keep both with an .imported suffix.
      permission: "&fdgeysermenu.import &7or &fdgeysermenu.admin"
    lang:
      usage: "&f/dgm lang [<code>] &7or &f/mmflang <code> &7or &f/lang <code>"
      detail: |-
        &7Switch MiaoMenu_fork's display language and reload all messages on the fly.
        &7With no argument, prints the current language and the list of available codes.
        &7Common codes: &fen&7 (English), &fzh_TW&7 (Traditional Chinese). Drop your own &f<code>.yml&7 into plugins/MiaoMenu_fork/lang/ to add a locale.
        &7After switching, &f/dgm help&7 and every other message changes language — no restart required.
      permission: "&fdgeysermenu.admin"
    about:
      usage: "&f/dgm about"
      detail: |-
        &7Show plugin version, Fork / Original GitHub links and the Modrinth download page.
        &7If a newer version is detected on Modrinth, it's shown at the bottom.
      permission: "&7(no permission needed)"
    whoami:
      usage: "&f/dgm whoami"
      detail: |-
        &7Diagnoses how Floodgate / Geyser identifies you. Use this when a Bedrock
        &7player ends up seeing the Java chest GUI (common with Velocity proxies).
        &7Prints: floodgate plugin version, isFloodgatePlayer result, UUID prefix,
        &7Bedrock username / xuid, linkedPlayer status, and the final smart-dispatch verdict.
        &7Any false / null line points to the broken link — no need to dig through server logs.
      permission: "&7(no permission needed; only shows your own info)"
    help:
      usage: "&f/dgm help [<sub>]"
      detail: |-
        &7Without an argument, lists every subcommand; with an argument, shows that subcommand's deep dive.
        &7Example: &f/dgm help import&7 prints the full import walkthrough.
      permission: "&7(no permission needed)"

