  whoami: "&7✦ Diagnose how Floodgate identifies you"
  help: "&e✦ Show the help page"

command:
  unknown: "&c✦ Unknown command. Please run /dgm help."
  usage-open: "&c✦ Usage: /dgm open <menu-name>"
  usage-import: |-
    &c✦ Usage:
    &7  /dgm import scan
    &7  /dgm import preview <source>
    &7  /dgm import apply <source> <token> [--overwrite|--rename]
    &7  /dgm import rollback [backupId]
  usage-lang: "&c✦ Usage: &f/dgm lang <code>&c or &f/mmflang <code>&c (no arg = show current + available)"

import:
  scan:
    header: "&b✦ Detected &e{0} &bimportable candidate folder(s):"
    entry: "&7  · &e{0} &7— Java menus &a{1} &7/ Bedrock menus &a{2} &7/ config-version &b{3}"
    entry-deluxemenus: "&7  · &e{0} &d[DeluxeMenus]&7 — menus &a{1} &7(auto-converted into both java_menus/ and bedrock_menus/, original folder preserved)"
    empty: "&e✦ No importable folder detected (searches plugins/ for DGeyserMenu, dgeysermenu, MiaoMenu, DeluxeMenus, dmenu)."
    hint: "&7✎ Next: &f/dgm import preview <source> &7to view diff and confirm token."
  preview:
    header: "&b✦ Preview &e{0}&b: add &a{1} &b/ skip &7{2} &b/ conflict &c{3}"
    add: "&a  + {0}"
    skip: "&7  = {0}"
    conflict: "&c  ! {0}"
    truncated: "&7  ... ({0} more not shown)"
    token: "&e✦ Confirm token: &f{0} &7— apply with &f/dgm import apply {1} {0}"
    unknown-source: "&c✦ Importable folder &e{0}&c not found. Try &f/dgm import scan&c first."
    io-error: "&c✦ IO error while previewing &e{0}&c. See console for details."
    deluxemenus-note: |-
      &d✦ DeluxeMenus layout detected — two outputs will be produced per menu
      &7  · &fjava_menus/<id>.yml&7 — Java chest GUI (preserves slot, full left/right/middle/shift click chains)
      &7  · &fbedrock_menus/<id>.yml&7 — Bedrock Floodgate form (slot-ordered button list; only the first action per button)
      &7  · Action prefix mapping: [console]→[cmd], [openguimenu] X→[player] dgm open X; the rest is preserved
      &7  · material → Bedrock texture follows a vanilla mapping table; unmapped materials fall back to text-only buttons
      &7  · update / skin fields are not carried over; conditions / view_requirement are kept verbatim for your review
      &7  · The original DeluxeMenus folder is untouched; rollback is always available
  apply:
    no-session: "&c✦ No matching preview session found (expired after 5 min). Re-run &f/dgm import preview <source>&c."
    token-mismatch: "&c✦ Source or token mismatch. Please re-check the preview output."
    success: "&a✦ Imported &e{0}&a: added &f{1}&a / skipped &f{2}&a / conflicts handled &f{3}&a, backup &7{4}&a. Menus reloaded."
    io-error: "&c✦ IO error while applying. See console. Existing backup is preserved."
  rollback:
    success: "&a✦ Restored &f{1}&a files from backup &e{0}&a and reloaded."
    not-found: "&e✦ No import backups available."
    io-error: "&c✦ Failed to restore backup &e{0}&c. See console for details."

