# =====================================================================
#  MiaoMenu_fork — Bedrock panel selector (default test.yml)
#  Fork:     https://github.com/Avery11111101/MiaoMenu_fork
#  Original: https://github.com/Yamada0001/MiaoMenu
# ---------------------------------------------------------------------
#  6 顆網格式按鈕的 panel selector，視覺與原作 demo（pic/2.png）對齊：
#  Bedrock SimpleForm 在 ≤6 顆 button 時會自動鋪成 3×2 網格，每顆都顯示
#  左側貼圖 + 文字。伺服器主請把每顆 button 的 text / icon / command /
#  execute_as 改成自家面板要做的事。
#
#  支援鍵（完整解說請見 README.md 與 java_menus/test.yml）：
#    menu.title / menu.items[]:
#      text                   — 按鈕文字（支援 § 顏色碼，\n 多行）
#      icon                   — 資源包貼圖路徑或 PNG URL
#      icon_type              — path（預設）或 url
#      command                — 動作字串（可帶 [player]/[cmd]/[message]/[close]/[menu]）
#      execute_as             — player / cmd / message / close
#      conditions             — AND / OR / 巢狀 children
#      item_conditions        — 舊版隱式 AND（保留向後相容）
#      lock_message           — 覆寫 message.item-locked
#      unsupported_on_bedrock — true 時點按鈕會印「Java 限定」提示
#    requirement_blocks       — 具名可重複使用的 condition 群組
#    view_requirement         — 整個 menu 入口閘 + fallback_menu
#
#  Tip：Bedrock SimpleForm 一顆按鈕只能跑一個動作，需要多動作鏈請用
#  [menu] 把點擊轉到 Java 端的選單，再在 Java 側用 click_commands 串。
#
#  所有 icon 路徑都對照 Mojang/bedrock-samples 原版資源包驗證過，保證載得到。
# =====================================================================

menu:
  title: "§6§l▍§e§lMiaoMenu §6§l▍§r §7| §f%player_name%"

  items:

    # ---- 1. 商店面板 -------------------------------------------------
    - text: "§a§l商店面板\n§7點此開啟"
      icon: "textures/items/emerald"
      icon_type: "path"
      command: "[message] §a這裡換成你的商店指令，例如 [cmd] cmi shop"
      execute_as: "player"

    # ---- 2. 貴賓面板（VIP 權限示範） ---------------------------------
    - text: "§e§l貴賓面板\n§7VIP 專屬"
      icon: "textures/items/gold_ingot"
      icon_type: "path"
      command: "[message] §eVIP 通過！換成你的 VIP 面板指令。"
      execute_as: "player"
      conditions:
        operator: AND
        requirements:
          - type: block
            block: vip_only

    # ---- 3. 玩家面板 -------------------------------------------------
    - text: "§b§l玩家面板\n§7查看玩家"
      icon: "textures/items/compass_item"
      icon_type: "path"
      command: "list"
      execute_as: "player"

    # ---- 4. 傳送面板 -------------------------------------------------
    - text: "§5§l傳送面板\n§7快速移動"
      icon: "textures/items/ender_pearl"
      icon_type: "path"
      command: "[message] §5這裡換成傳送指令，例如 [player] warp"
      execute_as: "player"

    # ---- 5. 管理面板（OP 權限示範） ----------------------------------
    - text: "§d§l管理面板\n§7OP 專用"
      icon: "textures/items/minecart_command_block"
      icon_type: "path"
      command: "[message] §d歡迎管理員 %player_name%"
      execute_as: "player"
      conditions:
        operator: AND
        requirements:
          - type: permission
            permission: "miaomenu.admin"
      lock_message: "§c你不是管理員，無法開啟此面板。"

    # ---- 6. 關閉選單 -------------------------------------------------
    - text: "§c§l關閉選單\n§7按此離開"
      icon: "textures/ui/cancel"
      icon_type: "path"
      command: ""
      execute_as: "close"

# ---------------------------------------------------------------------
# Reusable, named condition groups.
# 從 menu.items[].conditions.requirements 用 type: block + block: <名稱> 引用。
# 每個 block 可以帶自己的 deny_message 與 fallback_menu。
# ---------------------------------------------------------------------
requirement_blocks:
  vip_only:
    deny_message: "§cVIP 玩家專屬。"
    requirements:
      - type: permission
        permission: "miaomenu.vip"

# ---------------------------------------------------------------------
# Menu-level 入口閘。玩家未通過則 menu 拒絕開啟、印 deny_message、
# 並（可選）導去 fallback_menu。fallback_menu 設 "" 關閉導向。
# dgeysermenu.use 在 plugin.yml 預設 true，所以一般玩家都能開。
# ---------------------------------------------------------------------
view_requirement:
  deny_message: "§c你目前不能開啟此選單。"
  fallback_menu: ""
  requirements:
    - type: permission
      permission: dgeysermenu.use
