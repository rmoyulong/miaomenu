      initialize-failed: "BStats initialization failed."
    proxy:
      detected: "检测到代理: {0} - 跨服命令已启用"
      velocity-forwarding-required: "Velocity 模式: 请确保已启用 BungeeCord 插件消息转发"
      disabled: "未检测到代理 - 跨服命令已禁用"
