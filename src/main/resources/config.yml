      descriptions-missing: "Could not find 'messages.descriptions' node in config.yml."
      execute-failed: "Failed to execute command '{0}' for sender '{1}'."
    action:
      dispatch-failed: "Failed to dispatch action '{0}' for player '{1}'."
    hot-reload:
      initialize-failed: "Failed to initialize HotReloadManager. Menu hot-reload will be disabled."
      loop-failed: "HotReloadManager watcher loop failed."
    floodgate:
      player-check-failed: "Failed to check whether player {0} is a Floodgate player."
