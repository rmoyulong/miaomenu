# =========================================================
# MiaoMenu_fork 主設定檔
# Fork:           https://github.com/Avery11111101/MiaoMenu_fork
# 原作 / Original: https://github.com/Yamada0001/MiaoMenu
# ---------------------------------------------------------
# 中文：所有玩家可見的訊息已搬到 lang/<language>.yml；
#       本檔只保留功能性設定。請勿任意更改版本號！
# English: All player-visible messages have been moved to
#          lang/<language>.yml; this file only keeps
#          functional settings. Do not change the version numbers!
# =========================================================

# 請勿隨意更改版本號！！！！
config-version: 16 # config.yml 的版本號檢測
menu-version: 8    # test.yml 的版本號檢測

# 語言（lang/<language>.yml 內建：en、zh_TW；預設 en）
# Language file under lang/<language>.yml (bundled: en, zh_TW; default en)
language: en

settings:
  open-menu-sound: # 開啟選單的音效設定
    enabled: true # 是否啟用「開啟選單時」的音效
    sound: "entity.experience_orb.pickup" # 原版 MC 音效
    volume: 1.0 # 音量 範圍 0.0-1.0
    pitch: 1.0  # 音調 範圍 0.5-2.0

    # 預設開啟的選單
  default-menu: "test"

  hot-reload:
    enabled: true # 當檔案被儲存時，無需輸入 reload，設定會自動重新載入。
  auto-generate-examples: true # 自動產生範例檔案開關，僅在沒有範例時才產生

  velocity-network: true # 是否啟用 Velocity 網路支援（自動偵測 BungeeCord）

  # 物品解析器設定（自動偵測已安裝的插件 IA / CE / MMO / HEADBASE）
  item-resolver:
    fallback-material: STONE # 當物品來源插件未安裝或物品不存在時的備用原版材質

  menu-clock:
    enabled: true # 是否啟用整個鐘錶功能
    give-on-join: true # 會檢測背包是否已有鐘錶，避免重複發放。
