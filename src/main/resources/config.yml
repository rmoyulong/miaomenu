# 请勿随意更改版本号！！！！
config-version: 11 #config.yml的版本号检测
menu-version: 3 #test.yml的版本号检测
settings:
  open-menu-sound: #打开菜单的音效配置
    enabled: true
    sound: "entity.experience_orb.pickup" #MC原版的音效
    volume: 1.0 #音量 范围 0.0-1.0
    pitch: 1.0 #音调   范围 0.5-2.0
  default-menu: "test" #默认打开的菜单（与文件名同步无需后缀）

  hot-reload:
    enabled: true # 当文件被保存时，无需输入reload，配置会自动重新加载。
  auto-generate-examples: true # 自动生成示例文件开关 仅在没有的时候生成

  # CraftEngine 自定义物品支持
  craftengine:
    enabled: false # 是否启用 CraftEngine 自定义物品支持
    fallback-material: STONE # 当 CraftEngine 未安装或物品不存在时的备用材质

  menu-clock:
    enabled: true # 是否启用整个钟表功能
    give-on-join: true # 会检测背包中是否已有钟表，避免重复发放。

# 支持&R&G&B颜色格式
messages:
  default-item-name: "&6时光之镜 &7(右键打开菜单)"
  message:
    no-permission: "&c✦ 权限不足，你无法触碰这道指令。"
    players-only: "&c✦ 只有身临其境的冒险者（玩家）才能使用此令。"
    menu-not-found: "&c✦ 未曾见过名为 &e{0}&c 的菜单，请检查拼写。"
    error: "&c✦ 操作受阻，请查看控制台探明原因。"
    invalid-player: "&c✦ 寻无此人，或他已远去（离线）。"
    config-update-warning: "&e✦ 检测到旧版配置，正在尝试自动更迭..."
    reloaded: "&a✦ 配置文件已更新，一切就绪。"
    io-error: "&c✦ 笔触受阻，无法在卷轴上书写（IO错误），请检查封印权限(文件权限)。"

  verbose:
    config-adding-key: "✦ 拾遗补缺，刻写法则: {0}"
    config-keys-added: "✦ 卷轴焕新完毕，共增添 {0} 处笔触"

  help:
    header: "&6✿ &e你好呀，旅行者 &6✿"
    usage: "&7✎ 悬停查看详情，轻触以令之行"

  descriptions:
    open: "&a✦ 翻开指定的魔法卷轴"
    reload: "&c✦ 让核心法则重焕新生"
    help: "&e✦ 探索智慧的指引篇章"

  command:
    unknown: "&c✦ 虚空并未回应这句未知的低语，请查阅 /dgm help。"
    usage-open: "&c✦ 吟唱咒语的真确格式：/dgm open <卷轴名称>"

  open:
    error: "&c✦ 界面展开失败，请查阅控制台日志。"

  menu:
    clock:
      name: "&6时光之镜 &7(右键打开菜单)"
      given: "&a✦ 已获赠时光之镜，右键即可映照出菜单！"
      restored: "&f✦ 物品已完好如初地归还于你。"

  hot-reload:
    initialized: "✦ 菜单的律动已开始（自重载已启动）。"
    detected: "✦ 感知到波动: {0}，正在重塑菜单..."
